<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro Image Converter</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% -20%, #1e1b4b, var(--bg));
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 32px;
      border-radius: 24px;
      width: 100%;
      max-width: 650px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h2 {
      margin-top: 0;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .menu {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      background: rgba(15, 23, 42, 0.5);
      padding: 6px;
      border-radius: 12px;
    }

    .menu button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .menu button.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    textarea {
      width: 100%;
      height: 180px;
      background: rgba(2, 6, 23, 0.5);
      border: 1px solid #334155;
      color: #38bdf8;
      padding: 16px;
      border-radius: 12px;
      box-sizing: border-box;
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      resize: vertical;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s, filter 0.2s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-conv {
      background: var(--success);
    }

    .btn-clr {
      background: #334155;
      color: var(--text-dim);
    }

    .btn-dl {
      background: var(--warning);
      display: none;
      margin-top: 15px;
      text-decoration: none;
      width: 100%;
      box-sizing: border-box;
      color: #000;
    }

    .preview {
      margin-top: 24px;
      border: 2px dashed #334155;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      background: rgba(15, 23, 42, 0.3);
    }

    img {
      max-width: 100%;
      max-height: 400px;
      display: none;
      margin: 0 auto;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
    }

    .empty-state {
      color: var(--text-dim);
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Image Byte Converter</h2>

    <div class="menu">
      <button id="hBtn" class="active" onclick="setMode('hex')">Hex to Image</button>
      <button id="bBtn" onclick="setMode('base64')">Base64 to Image</button>
    </div>

    <textarea id="ipt" placeholder="Paste Hex code here..."></textarea>

    <div class="controls">
      <button class="btn btn-clr" onclick="clr()">Clear</button>
      <button class="btn btn-conv" onclick="run()">Convert & Preview</button>
    </div>

    <div class="preview" id="previewBox">
      <div class="empty-state" id="emptyTxt">Image preview will appear here</div>
      <img id="outImg">
      <a id="dlBtn" class="btn btn-dl" download="converted-image.png">Download Image</a>
    </div>
  </div>

  <script>
    let mode = 'hex';

    function setMode(m) {
      mode = m;
      document.getElementById('hBtn').classList.toggle('active', m === 'hex');
      document.getElementById('bBtn').classList.toggle('active', m === 'base64');
      document.getElementById('ipt').placeholder = m === 'hex' ? "Paste Hex code here..." : "Paste Base64 string here...";
    }

    function clr() {
      document.getElementById('ipt').value = '';
      document.getElementById('outImg').style.display = 'none';
      document.getElementById('dlBtn').style.display = 'none';
      document.getElementById('emptyTxt').style.display = 'block';
    }

    function run() {
      const input = document.getElementById('ipt').value.trim();
      const outImg = document.getElementById('outImg');
      const dlBtn = document.getElementById('dlBtn');
      const emptyTxt = document.getElementById('emptyTxt');

      if (!input) return;

      let base64String = "";

      if (mode === 'hex') {
        const cleanHex = input.replace(/0x|[\s,]/g, '');
        try {
          const byteArray = new Uint8Array(cleanHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
          let binary = '';
          for (let i = 0; i < byteArray.byteLength; i++) {
            binary += String.fromCharCode(byteArray[i]);
          }
          base64String = btoa(binary);
        } catch (e) {
          alert("Invalid Hex Format");
          return;
        }
      } else {
        base64String = input.replace(/^data:image\/\w+;base64,/, '');
      }

      const fullBase64 = `data:image/png;base64,${base64String}`;
      outImg.src = fullBase64;
      outImg.style.display = 'block';
      dlBtn.href = fullBase64;
      dlBtn.style.display = 'flex';
      emptyTxt.style.display = 'none';
    }
  </script>
</body>

</html>
